<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Выбор карт Таро</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96d;
    --deep: #0d0a1a;
    --card-bg: #1a1428;
    --card-border: #3d2f5e;
    --selected: #6b3fa0;
    --selected-glow: rgba(107, 63, 160, 0.6);
    --text: #e8d5b0;
    --text-dim: #9b8a6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Lora', serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Фон со звёздами */
  .stars-bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(107, 63, 160, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(50, 20, 90, 0.2) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(30, 10, 60, 0.4) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Анимированные звёздочки */
  .star {
    position: fixed;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--op); transform: scale(1); }
  }

  .container {
    position: relative;
    z-index: 1;
    padding: 20px 16px 100px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Заголовок */
  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .moon-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
  }

  .count-indicator {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(107, 63, 160, 0.2);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 6px 16px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--gold-light);
  }

  .count-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--card-border);
    transition: all 0.3s;
  }

  .count-dot.filled {
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }

  /* Сетка карт */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .card-slot {
    aspect-ratio: 2/3.5;
    cursor: pointer;
    position: relative;
    perspective: 800px;
    user-select: none;
  }

  .card-inner {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 10px;
  }

  /* Флип карты - всегда одинаковый, reversed влияет только на бейдж */
  .card-slot.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* Рубашка карты */
  .card-back {
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .card-slot:hover .card-back {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201, 168, 76, 0.2);
  }

  .card-slot.selected .card-back {
    border-color: var(--selected);
    box-shadow: 0 0 25px var(--selected-glow);
  }

  /* Орнамент на рубашке */
  .card-ornament {
    width: 75%;
    height: 85%;
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-radius: 6px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-ornament::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 4px;
  }

  .card-symbol {
    font-size: 22px;
    opacity: 0.6;
  }

  /* Лицевая сторона карты */
  .card-front {
    transform: rotateY(180deg);
    background: linear-gradient(160deg, #1e1535 0%, #0f0c1e 100%);
    border: 1.5px solid var(--gold);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 5px;
    text-align: center;
    box-shadow: 0 0 20px rgba(201, 168, 76, 0.3);
    overflow: hidden;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.4px;
    line-height: 1.4;
    text-align: center;
    padding: 0 6px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.95), 0 0 10px rgba(201,168,76,0.5);
    word-break: break-word;
  }

  .card-desc {
    font-family: 'Lora', serif;
    font-size: 8px;
    font-style: italic;
    color: #c9a84c;
    text-align: center;
    padding: 0 4px;
    margin-top: 5px;
    line-height: 1.4;
    opacity: 0.9;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  .card-reversed-badge {
    font-size: 9px;
    color: #e8c96d;
    margin-top: 5px;
    font-style: normal;
    opacity: 0.9;
    letter-spacing: 0.2px;
  }

  .card-emoji {
    font-size: 28px;
    margin-bottom: 2px;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.7));
  }

  /* Кнопка подтверждения */
  .confirm-btn {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 16px;
    background: linear-gradient(to top, var(--deep) 60%, transparent);
  }

  .confirm-inner {
    max-width: 480px;
    margin: 0 auto;
  }

  button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  button.active {
    background: linear-gradient(135deg, #6b3fa0 0%, #9b5de5 50%, #6b3fa0 100%);
    color: #fff;
    box-shadow: 0 4px 30px rgba(107, 63, 160, 0.6);
    animation: pulse-btn 2s ease-in-out infinite;
  }

  button.inactive {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-dim);
    box-shadow: none;
    cursor: not-allowed;
  }

  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 4px 30px rgba(107, 63, 160, 0.6); }
    50% { box-shadow: 0 4px 45px rgba(107, 63, 160, 0.9), 0 0 80px rgba(155, 93, 229, 0.3); }
  }

  button.active::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.08), transparent);
    transform: rotate(45deg);
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%) rotate(45deg); }
    100% { transform: translateX(100%) rotate(45deg); }
  }

  /* Выбранные карты внизу */
  .selected-preview {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
    min-height: 32px;
    align-items: center;
  }

  .selected-tag {
    background: rgba(107, 63, 160, 0.3);
    border: 1px solid var(--selected);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 120px;
    animation: tagIn 0.3s ease;
  }

  @keyframes tagIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Лоадер */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13, 10, 26, 0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .loading-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .loader-orb {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #9b5de5, #4a1a8a);
    box-shadow: 0 0 40px rgba(155, 93, 229, 0.8);
    animation: orbPulse 1.5s ease-in-out infinite;
    margin-bottom: 16px;
  }

  @keyframes orbPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(155, 93, 229, 0.8); }
    50% { transform: scale(1.15); box-shadow: 0 0 70px rgba(155, 93, 229, 1); }
  }

  .loading-text {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="stars-bg"></div>

<div class="container">
  <div class="header">
    <span class="moon-icon">🔮</span>
    <div class="title" id="main-title">ВЫБЕРИТЕ КАРТЫ</div>
    <div class="subtitle" id="sub-title">Сосредоточьтесь на вашем вопросе</div>
    <div class="count-indicator" id="count-indicator">
      <!-- dots добавляются динамически -->
    </div>
  </div>

  <div class="cards-grid" id="cards-grid">
    <!-- Карты рендерятся JS -->
  </div>
</div>

<div class="confirm-btn" id="confirm-area">
  <div class="confirm-inner">
    <div class="selected-preview" id="selected-preview"></div>
    <button class="inactive" id="confirm-btn" onclick="confirmSelection()">
      ✨ Выберите карты
    </button>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="loader-orb"></div>
  <div class="loading-text">КАРТЫ ГОВОРЯТ...</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

  {name:"Двойка Кубков", desc:"Партнёрство, притяжение, союз"},
  {name:"Тройка Кубков", desc:"Дружба, веселье, поддержка"},

  {name:"Тройка Пентаклей", desc:"Труд, команда, мастерство"},
  {name:"Четвёрка Пентаклей", desc:"Скупость, контроль, стабильность"},
  {name:"Пятёрка Пентаклей", desc:"Нужда, изоляция, трудности"},
  {name:"Шестёрка Пентаклей", desc:"Щедрость, баланс, помощь"},
  {name:"Семёрка Пентаклей", desc:"Терпение, оценка, ожидание"},
  {name:"Восьмёрка Пентаклей", desc:"Усердие, обучение, развитие"},
  {name:"Девятка Пентаклей", desc:"Достаток, независимость, успех"},
  {name:"Десятка Пентаклей", desc:"Наследие, семья, процветание"},
  {name:"Паж Пентаклей", desc:"Учёба, старание, новый план"},
  {name:"Рыцарь Пентаклей", desc:"Методичность, надёжность, труд"},
  {name:"Королева Пентаклей", desc:"Практичность, уют, достаток"},
  {name:"Король Пентаклей", desc:"Богатство, щедрость, зрелость"},
];

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const params = new URLSearchParams(window.location.search);
const mode = params.get('mode') || 'reading';
const maxCount = parseInt(params.get('count') || '3');

// Обновляем заголовок под режим
if (mode === 'daily') {
  document.getElementById('main-title').textContent = 'КАРТА ДНЯ';
  document.getElementById('sub-title').textContent = 'Выберите одну карту';
}

// Случайно выбираем 7 карт из колоды
function getRandomCards(n) {
  const shuffled = [...TAROT_CARDS].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

const displayCards = getRandomCards(9);
// Для каждой карты заранее определяем, будет ли она перевёрнута при открытии
const cardReversed = displayCards.map(() => Math.random() < 0.5);

const selectedIndices = new Set();

// ===== Рендер счётчика =====
function renderCountDots() {
  const container = document.getElementById('count-indicator');
  container.innerHTML = '';
  for (let i = 0; i < maxCount; i++) {
    const dot = document.createElement('div');
    dot.className = 'count-dot' + (i < selectedIndices.size ? ' filled' : '');
    container.appendChild(dot);
  }
  const label = document.createTextNode(` Выбрано: ${selectedIndices.size}/${maxCount}`);
  container.appendChild(label);
}

// ===== Рендер карт =====
function renderCards() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';

  displayCards.forEach((card, index) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.id = `card-${index}`;
    slot.onclick = () => toggleCard(index);

    const isRev = cardReversed[index];

    slot.innerHTML = `
      <div class="card-inner">
        <div class="card-back">
          <div class="card-ornament">
            <span class="card-symbol">✦</span>
          </div>
        </div>
        <div class="card-front">
          <div class="card-name">${card.name}</div>
          <div class="card-desc">${card.desc}</div>
        </div>
      </div>
    `;

    // Убрали slot.classList.add('reversed') - все карты выглядят одинаково
    grid.appendChild(slot);
  });
}

// ===== Выбор карты =====
let autoSubmitTimer = null;

function toggleCard(index) {
  // Если уже запущен таймер автоотправки - блокируем все нажатия
  if (autoSubmitTimer) return;

  // Уже выбрана - нельзя снять обратно
  if (selectedIndices.has(index)) return;

  // Лимит набран
  if (selectedIndices.size >= maxCount) {
    tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('error');
    return;
  }

  selectedIndices.add(index);
  const slot = document.getElementById(`card-${index}`);
  slot.classList.add('selected', 'flipped');
  tg.HapticFeedback && tg.HapticFeedback.impactOccurred('medium');

  updateUI();

  // Автоматическая отправка когда выбрано нужное количество
  if (selectedIndices.size === maxCount) {
    autoSubmitTimer = setTimeout(() => {
      confirmSelection();
    }, 700);
  }
}

// ===== Обновление UI =====
function updateUI() {
  renderCountDots();
  updateSelectedPreview();
  updateConfirmButton();
}

function updateSelectedPreview() {
  const preview = document.getElementById('selected-preview');
  preview.innerHTML = '';
  selectedIndices.forEach(i => {
    const card = displayCards[i];
    const tag = document.createElement('div');
    tag.className = 'selected-tag';
    tag.textContent = card.name;
    preview.appendChild(tag);
  });
}

function updateConfirmButton() {
  const btn = document.getElementById('confirm-btn');
  const isReady = selectedIndices.size === maxCount;
  if (isReady) {
    // Карты выбраны - показываем что идёт отправка
    btn.className = 'active';
    btn.textContent = mode === 'daily' ? '✨ Открываю послание...' : '✨ Отправляю расклад...';
    btn.style.pointerEvents = 'none';
  } else {
    btn.className = 'inactive';
    btn.style.pointerEvents = 'none'; // кнопка декоративная, вся логика в toggleCard
    const left = maxCount - selectedIndices.size;
    btn.textContent = `Выберите ещё ${left} ${left === 1 ? 'карту' : left < 5 ? 'карты' : 'карт'}`;
  }
}

// ===== Подтверждение (вызывается автоматически из таймера) =====
function confirmSelection() {
  if (selectedIndices.size !== maxCount) return;

  document.getElementById('loading').classList.add('show');
  tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('success');

  const selected = [...selectedIndices].map(i => ({
    name: displayCards[i].name,
    reversed: cardReversed[i],
    display: displayCards[i].name + (cardReversed[i] ? ' (перевёрнута)' : ' (прямо)'),
  }));

  const payload = JSON.stringify({
    mode: mode,
    cards: selected,
  });

  // Даём лоадеру показаться, потом отправляем
  setTimeout(() => {
    tg.sendData(payload);
  }, 600);
}

// ===== Генерация звёзд =====
function createStars() {
  const count = 60;
  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2 + 1;
    star.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      top: ${Math.random() * 100}%;
      left: ${Math.random() * 100}%;
      --dur: ${Math.random() * 3 + 2}s;
      --op: ${Math.random() * 0.5 + 0.2};
      animation-delay: ${Math.random() * 4}s;
    `;
    document.body.appendChild(star);
  }
}

// ===== Инициализация =====
createStars();
renderCards();
renderCountDots();
updateConfirmButton();
</script>
</body>
</html>
