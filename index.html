  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96d;
    --deep: #0d0a1a;
    --card-bg: #1a1428;
    --card-border: #3d2f5e;
    --selected: #6b3fa0;
    --selected-glow: rgba(107, 63, 160, 0.6);
    --text: #e8d5b0;
    --text-dim: #9b8a6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Lora', serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  .stars-bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(107, 63, 160, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(50, 20, 90, 0.2) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(30, 10, 60, 0.4) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: fixed;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    opacity: 0;
    pointer-events: none;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--op); transform: scale(1); }
  }

  .container {
    position: relative;
    z-index: 1;
    padding: 20px 16px 120px;
    max-width: 480px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .moon-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 12px;
  }

  .count-indicator {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(107, 63, 160, 0.2);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--gold-light);
  }

  .count-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--card-border);
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .count-dot.filled {
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }

  /* Сетка карт */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .card-slot {
    aspect-ratio: 2/3.2;
    cursor: pointer;
    position: relative;
    perspective: 900px;
    user-select: none;
    -webkit-user-select: none;
  }

  .card-inner {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 10px;
    will-change: transform;
  }

  .card-slot.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* Рубашка */
  .card-back {
    background: linear-gradient(160deg, #1a1035 0%, #0d0a1a 100%);
    border: 1.5px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .card-slot:active .card-back {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201, 168, 76, 0.25);
  }

  .card-slot.selected .card-back {
    border-color: var(--selected);
    box-shadow: 0 0 25px var(--selected-glow);
  }

  .card-ornament {
    width: 72%;
    height: 82%;
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-radius: 6px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
  }

  .card-ornament::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(201, 168, 76, 0.15);
    border-radius: 4px;
  }

  .card-symbol {
    font-size: 20px;
    opacity: 0.5;
  }

  .card-num {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: rgba(201, 168, 76, 0.4);
    letter-spacing: 1px;
  }

  /* Лицевая сторона */
  .card-front {
    transform: rotateY(180deg);
    border: 1.5px solid var(--gold);
    box-shadow: 0 0 15px rgba(201, 168, 76, 0.2);
    background: #0d0a1a;
  }

  /* Картинка карты */
  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
    display: block;
  }

  /* Fallback если нет картинки */
  .card-front-text {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 5px;
    background: linear-gradient(160deg, #1e1535 0%, #0f0c1e 100%);
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.3px;
    line-height: 1.4;
    text-align: center;
    padding: 0 4px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  }

  .card-desc {
    font-size: 8px;
    font-style: italic;
    color: var(--gold);
    text-align: center;
    padding: 0 4px;
    margin-top: 4px;
    line-height: 1.4;
    opacity: 0.85;
  }

  /* Оверлей с именем карты поверх картинки */
  .card-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    padding: 14px 5px 5px;
    border-radius: 0 0 8px 8px;
    text-align: center;
  }

  .card-label-name {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.3px;
    line-height: 1.3;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }

  /* Кнопка подтверждения */
  .confirm-btn {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 12px 16px 20px;
    background: linear-gradient(to top, var(--deep) 65%, transparent);
  }

  .confirm-inner {
    max-width: 480px;
    margin: 0 auto;
  }

  .selected-preview {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
    min-height: 28px;
    align-items: center;
    flex-wrap: wrap;
  }

  .selected-tag {
    background: rgba(107, 63, 160, 0.35);
    border: 1px solid var(--selected);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 130px;
    animation: tagIn 0.25s ease;
  }

  @keyframes tagIn {
    from { opacity: 0; transform: scale(0.8) translateY(4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  button.active {
    background: linear-gradient(135deg, #5a2d91 0%, #9b5de5 50%, #5a2d91 100%);
    color: #fff;
    box-shadow: 0 4px 30px rgba(107, 63, 160, 0.6);
    animation: pulse-btn 2s ease-in-out infinite;
  }

  button.inactive {
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 4px 30px rgba(107, 63, 160, 0.6); }
    50% { box-shadow: 0 4px 50px rgba(107, 63, 160, 0.95), 0 0 80px rgba(155, 93, 229, 0.3); }
  }

  button.active::before {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 50%; height: 200%;
    background: rgba(255,255,255,0.12);
    transform: skewX(-20deg);
    animation: shimmer 2.5s ease-in-out infinite;
  }

  @keyframes shimmer {
    0% { left: -60%; }
    100% { left: 160%; }
  }

  /* Лоадер */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13, 10, 26, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s;
  }

  .loading-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .loader-orb {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #b06aff, #3d0d80);
    box-shadow: 0 0 50px rgba(155, 93, 229, 0.9);
    animation: orbPulse 1.4s ease-in-out infinite;
    margin-bottom: 18px;
  }

  @keyframes orbPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(155, 93, 229, 0.8); }
    50% { transform: scale(1.18); box-shadow: 0 0 80px rgba(155, 93, 229, 1), 0 0 120px rgba(107, 63, 160, 0.4); }
  }

  .loading-text {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 2px;
    animation: fadePulse 1.4s ease-in-out infinite;
  }

  @keyframes fadePulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* Анимация появления карт */
  .card-slot {
    animation: cardAppear 0.4s ease both;
  }

  @keyframes cardAppear {
    from { opacity: 0; transform: translateY(16px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
</head>

<div class="loading-overlay" id="loading">

  {name:"Король Пентаклей",desc:"Богатство, щедрость, зрелость",           img:"cards/pents_king.jpg"},
];

// Инициализация Telegram WebApp
const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : {
  ready: () => {},
  expand: () => {},
  sendData: (d) => console.log('sendData (dev):', d),
  HapticFeedback: { impactOccurred: () => {}, notificationOccurred: () => {} },
};
try { tg.ready(); } catch(e) {}
try { tg.expand(); } catch(e) {}

const params = new URLSearchParams(window.location.search);
const mode = params.get('mode') || 'reading';
const maxCount = parseInt(params.get('count') || '3');

if (mode === 'daily') {
  document.getElementById('main-title').textContent = 'КАРТА ДНЯ';
  document.getElementById('sub-title').textContent = 'Выберите одну карту';
}

// Перемешиваем и берём 9 карт
function getRandomCards(n) {
  const arr = [...TAROT_CARDS];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, n);
}

const displayCards = getRandomCards(9);
const cardReversed = displayCards.map(() => Math.random() < 0.5);
const selectedIndices = new Set();
let autoSubmitTimer = null;

function renderCountDots() {
  const c = document.getElementById('count-indicator');
  c.innerHTML = '';
  for (let i = 0; i < maxCount; i++) {
    const dot = document.createElement('div');
    dot.className = 'count-dot' + (i < selectedIndices.size ? ' filled' : '');
    c.appendChild(dot);
  }
  const lbl = document.createTextNode(` Выбрано: ${selectedIndices.size}/${maxCount}`);
  c.appendChild(lbl);
}

function renderCards() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  displayCards.forEach((card, index) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.id = `card-${index}`;
    slot.style.animationDelay = (index * 0.05) + 's';
    slot.onclick = () => toggleCard(index);

    slot.innerHTML = `
      <div class="card-inner">
        <div class="card-back">
          <div class="card-ornament">
            <span class="card-symbol">✦</span>
            <span class="card-num">${String(index + 1).padStart(2, '0')}</span>
          </div>
        </div>
        <div class="card-front">
          ${card.img
            ? `<img class="card-img" src="${card.img}" alt="${card.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-front-text><div class=card-name>${card.name}</div><div class=card-desc>${card.desc}</div></div>'">
               <div class="card-label"><div class="card-label-name">${card.name}</div></div>`
            : `<div class="card-front-text"><div class="card-name">${card.name}</div><div class="card-desc">${card.desc}</div></div>`
          }
        </div>
      </div>
    `;
    grid.appendChild(slot);
  });
}

function toggleCard(index) {
  if (autoSubmitTimer) return;
  if (selectedIndices.has(index)) return;
  if (selectedIndices.size >= maxCount) {
    try { tg.HapticFeedback.notificationOccurred('error'); } catch(e) {}
    return;
  }

  selectedIndices.add(index);
  document.getElementById(`card-${index}`).classList.add('selected', 'flipped');
  try { tg.HapticFeedback.impactOccurred('medium'); } catch(e) {}

  updateUI();

  if (selectedIndices.size === maxCount) {
    autoSubmitTimer = setTimeout(confirmSelection, 750);
  }
}

function updateUI() {
  renderCountDots();
  // Обновляем превью
  const preview = document.getElementById('selected-preview');
  preview.innerHTML = '';
  selectedIndices.forEach(i => {
    const tag = document.createElement('div');
    tag.className = 'selected-tag';
    tag.textContent = displayCards[i].name;
    preview.appendChild(tag);
  });
  // Обновляем кнопку
  const btn = document.getElementById('confirm-btn');
  const ready = selectedIndices.size === maxCount;
  if (ready) {
    btn.className = 'active';
    btn.textContent = mode === 'daily' ? '✨ Открываю послание...' : '✨ Отправляю расклад...';
    btn.style.pointerEvents = 'none';
  } else {
    btn.className = 'inactive';
    btn.style.pointerEvents = 'none';
    const left = maxCount - selectedIndices.size;
    btn.textContent = `Выберите ещё ${left} ${left === 1 ? 'карту' : left < 5 ? 'карты' : 'карт'}`;
  }
}

function confirmSelection() {
  if (selectedIndices.size !== maxCount) return;

  const isInsideTelegram = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData;
  if (!isInsideTelegram) {
    showError('Открой через кнопку в боте, а не напрямую по ссылке');
    return;
  }

  document.getElementById('loading').classList.add('show');

  const selected = [...selectedIndices].map(i => ({
    name: displayCards[i].name,
    reversed: cardReversed[i],
    display: displayCards[i].name + (cardReversed[i] ? ' (перевёрнута)' : ' (прямо)'),
  }));

  setTimeout(() => {
    try {
      tg.sendData(JSON.stringify({ mode, cards: selected }));
    } catch(e) {
      document.getElementById('loading').classList.remove('show');
      showError('Ошибка отправки. Попробуй снова через бота.');
    }
  }, 500);
}

function showError(msg) {
  document.getElementById('loading').classList.remove('show');
  autoSubmitTimer = null;
  const btn = document.getElementById('confirm-btn');
  btn.className = 'inactive';
  btn.style.pointerEvents = 'none';
  btn.style.background = 'rgba(180,40,40,0.4)';
  btn.style.color = '#fff';
  btn.textContent = '❌ ' + msg;
}

function createStars() {
  for (let i = 0; i < 55; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 0.8;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s;--op:${(Math.random()*0.5+0.15).toFixed(2)};animation-delay:${(Math.random()*5).toFixed(1)}s`;
    document.body.appendChild(s);
  }
}

createStars();
renderCards();
renderCountDots();
updateUI();
</script>
</body>
</html>
